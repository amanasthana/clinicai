{% extends "base.html" %}
{% block title %}Set New Password — ClinicAI{% endblock %}

{% block content %}
<style>
.auth-wrap {
  min-height: 100vh; display: flex; align-items: center;
  justify-content: center; background: #F9FAFB; padding: 24px;
}
.auth-card {
  background: #fff; border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  padding: 40px 36px; width: 100%; max-width: 400px;
}
.auth-icon {
  width: 52px; height: 52px; background: #EFF6FF;
  border-radius: 14px; display: flex; align-items: center;
  justify-content: center; font-size: 24px; margin-bottom: 20px;
}
.auth-title { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 6px; }
.auth-sub { font-size: 14px; color: #6B7280; margin-bottom: 28px; line-height: 1.5; }
.auth-label { font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; display: block; }
.auth-input {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid #E5E7EB; border-radius: 10px;
  font-size: 15px; font-family: inherit; color: #111827;
  outline: none; box-sizing: border-box; margin-bottom: 16px;
  transition: border-color .15s;
}
.auth-input:focus { border-color: #2563EB; }
.auth-btn {
  width: 100%; padding: 13px; background: #2563EB; color: #fff;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
  font-family: inherit; cursor: pointer; margin-top: 4px;
  transition: background .15s;
}
.auth-btn:hover { background: #1D4ED8; }
.auth-error {
  background: #FEF2F2; border: 1px solid #FECACA;
  color: #DC2626; border-radius: 8px;
  padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
}
.pw-hint { font-size: 12px; color: #9CA3AF; margin-top: -10px; margin-bottom: 16px; }
</style>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-icon">🔒</div>
    <div class="auth-title">Set new password</div>
    <div class="auth-sub">Choose a strong password. You'll use it to log in going forward.</div>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      <label class="auth-label" for="password1">New Password</label>
      <input class="auth-input" type="password" id="password1" name="password1"
        placeholder="Min. 8 characters" autofocus autocomplete="new-password">
      <div class="pw-hint">At least 8 characters</div>

      <label class="auth-label" for="password2">Confirm Password</label>
      <input class="auth-input" type="password" id="password2" name="password2"
        placeholder="Repeat new password" autocomplete="new-password">

      <button type="submit" class="auth-btn">Save Password →</button>
    </form>
  </div>
</div>
{% endblock %}
