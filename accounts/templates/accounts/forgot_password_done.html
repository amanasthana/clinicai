{% extends "base.html" %}
{% block title %}Check Your Email — ClinicAI{% endblock %}
{% block content %}
<style>
.auth-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#F9FAFB; padding:24px; }
.auth-card { background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.08); padding:40px 36px; width:100%; max-width:420px; text-align:center; }
</style>
<div class="auth-wrap">
  <div class="auth-card">
    <div style="font-size:48px; margin-bottom:20px;">📬</div>
    <div style="font-size:22px; font-weight:700; color:#111827; margin-bottom:10px;">Check your email</div>
    <div style="font-size:14px; color:#6B7280; line-height:1.6; margin-bottom:28px;">
      If an account exists for that email address, we've sent a password reset link. It will expire in 3 days.<br><br>
      Don't see it? Check your spam folder.
    </div>
    <a href="/accounts/login/" style="display:inline-block; padding:12px 28px; background:#2563EB; color:#fff; border-radius:10px; font-size:14px; font-weight:600; text-decoration:none;">Back to Login</a>
  </div>
</div>
{% endblock %}
