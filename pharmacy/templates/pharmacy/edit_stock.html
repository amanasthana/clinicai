{% extends "base.html" %}
{% block title %}Edit Stock — {{ item.display_name }}{% endblock %}

{% block content %}
<div class="page-container" style="max-width:600px;">

  <div style="display:flex; align-items:center; gap:12px; margin-bottom:24px;">
    <a href="/pharmacy/" style="font-size:13px; color:#6B7280; text-decoration:none;">← Back</a>
    <h1 style="font-size:20px; font-weight:700; color:#111827; margin:0;">Edit Stock</h1>
  </div>

  <div class="card">
    <div style="font-size:16px; font-weight:600; color:#374151; margin-bottom:4px;">{{ item.display_name }}</div>
    {% if item.medicine and item.medicine.generic_name %}
    <div style="font-size:13px; color:#9CA3AF; margin-bottom:20px;">{{ item.medicine.generic_name }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div class="resp-grid-2" style="gap:14px; margin-bottom:16px;">
        <div>
          <label style="display:block; font-size:13px; font-weight:500; color:#374151; margin-bottom:6px;">Batch Number</label>
          <input type="text" name="batch_number" value="{{ item.batch_number }}"
            placeholder="e.g. B2024-01" class="input-field" style="font-size:14px;">
        </div>
        <div>
          <label style="display:block; font-size:13px; font-weight:500; color:#374151; margin-bottom:6px;">Expiry Date</label>
          <input type="date" name="expiry_date"
            value="{% if item.expiry_date %}{{ item.expiry_date|date:'Y-m-d' }}{% endif %}"
            class="input-field" style="font-size:14px;">
        </div>
        <div>
          <label style="display:block; font-size:13px; font-weight:500; color:#374151; margin-bottom:6px;">Quantity</label>
          <input type="number" name="quantity" min="0" value="{{ item.quantity }}"
            class="input-field" style="font-size:14px;">
        </div>
        <div>
          <label style="display:block; font-size:13px; font-weight:500; color:#374151; margin-bottom:6px;">Unit Price (₹)</label>
          <input type="number" name="unit_price" min="0" step="0.01" value="{{ item.unit_price }}"
            class="input-field" style="font-size:14px;">
        </div>
        <div>
          <label style="display:block; font-size:13px; font-weight:500; color:#374151; margin-bottom:6px;">Reorder Level</label>
          <input type="number" name="reorder_level" min="0" value="{{ item.reorder_level }}"
            class="input-field" style="font-size:14px;">
        </div>
      </div>

      <div style="display:flex; gap:10px; flex-wrap:wrap; padding-top:16px; border-top:1px solid #E5E7EB;">
        <button type="submit" class="btn btn-primary btn-lg" style="flex:1; min-width:160px;">Save Changes</button>
        <a href="/pharmacy/" class="btn btn-secondary btn-lg" style="flex:1; min-width:120px; text-align:center;">Cancel</a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
